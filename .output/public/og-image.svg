<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <!-- Accent glow top-right -->
    <radialGradient id="glow1" cx="85%" cy="15%" r="35%">
      <stop offset="0%" stop-color="#8FAF8A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8FAF8A" stop-opacity="0"/>
    </radialGradient>
    <!-- Accent glow bottom-left -->
    <radialGradient id="glow2" cx="10%" cy="85%" r="25%">
      <stop offset="0%" stop-color="#8FAF8A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8FAF8A" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip for rounded rect -->
    <clipPath id="roundedClip">
      <rect width="1200" height="630" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Decorative accent circle top-right -->
  <circle cx="1080" cy="80" r="180" fill="none" stroke="#8FAF8A" stroke-width="1" stroke-opacity="0.12"/>
  <circle cx="1080" cy="80" r="120" fill="none" stroke="#8FAF8A" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Logo / Brand mark (top-left) -->
  <g transform="translate(80, 72)">
    <!-- Triangle -->
    <polygon points="0,28 16,0 32,28" fill="none" stroke="#8FAF8A" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Circle -->
    <circle cx="16" cy="14" r="5" fill="#8FAF8A"/>
    <!-- Brand name -->
    <text x="46" y="10" font-family="Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.4)" letter-spacing="0.12em" text-transform="uppercase">BUGAEV</text>
    <text x="46" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.12em">ВЕБ</text>
  </g>

  <!-- Badge (top) -->
  <rect x="80" y="138" width="296" height="32" rx="16" fill="rgba(143,175,138,0.12)" stroke="rgba(143,175,138,0.25)" stroke-width="1"/>
  <text x="176" y="159" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#8FAF8A" letter-spacing="0.10em" text-anchor="middle">DIGITAL + SMM ДЛЯ САЛОНА КРАСОТЫ</text>

  <!-- Main headline -->
  <text x="80" y="250" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900" fill="#FFFFFF" letter-spacing="-0.03em">Удалённый digital-отдел</text>
  <text x="80" y="330" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900" fill="#8FAF8A" letter-spacing="-0.03em">для салона красоты</text>
  <text x="80" y="410" font-family="Arial Black, Arial, sans-serif" font-size="68" font-weight="900" fill="rgba(255,255,255,0.85)" letter-spacing="-0.03em">в Москве — под ключ</text>

  <!-- Subtitle -->
  <text x="80" y="468" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)" letter-spacing="0.01em">Сайт · Telegram-бот · SMM · CRM YCLIENTS</text>

  <!-- Divider -->
  <line x1="80" y1="500" x2="1120" y2="500" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Price block -->
  <text x="80" y="548" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="-0.02em">50 000 ₽ / мес</text>
  <text x="320" y="548" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.35)" letter-spacing="0.01em"> — без скрытых платежей</text>

  <!-- CTA pill -->
  <rect x="820" y="510" width="300" height="56" rx="28" fill="#8FAF8A"/>
  <text x="970" y="544" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F0F0F" text-anchor="middle" letter-spacing="0.01em">Оставить заявку →</text>

  <!-- Telegram handle bottom-right -->
  <text x="1120" y="598" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.25)" text-anchor="end" letter-spacing="0.05em">@bugggd · bugaev-web.ru</text>
</svg>
