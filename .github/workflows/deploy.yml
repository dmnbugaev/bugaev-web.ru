name: Deploy bugaev-web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22222
          script: |
            cd /var/www/bugaev-web.ru
            git pull origin main
            npm ci
            npm run build
            pm2 restart bugaev-web
