name: Deploy dilia-salon

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22222
          envs: NUXT_SMTP_USER,NUXT_SMTP_PASS,NUXT_SMTP_TO
          script: |
            cd /var/www/dilia-salon
            git pull origin main
            printf 'NUXT_SMTP_USER=%s\nNUXT_SMTP_PASS=%s\nNUXT_SMTP_TO=%s\n' \
              "$NUXT_SMTP_USER" "$NUXT_SMTP_PASS" "$NUXT_SMTP_TO" > .env
            npm ci
            npm run build
            pm2 restart dilia-salon
